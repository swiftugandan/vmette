[workspace]
resolver = "2"
members = [
    "crates/vmette",
    "crates/vmette-assets",
    "crates/vmette-cli",
    "crates/vmette-proto",
    "crates/vmette-providers",
    "crates/vmette-daemon",
    "crates/vmette-mcp",
    "crates/vmette-provider-oci",
    "crates/vmette-provider-squashfs",
    "crates/vmette-provider-tar",
]

[workspace.package]
version = "0.1.1"
edition = "2021"
rust-version = "1.80"
license = "MIT"
repository = "https://github.com/chamuka-inc/vmette"

[workspace.dependencies]
objc2                = "0.6"
objc2-core-foundation = { version = "0.3", features = ["CFRunLoop"] }
objc2-foundation     = { version = "0.3", features = ["NSString", "NSURL", "NSError", "NSFileHandle", "NSRunLoop", "NSDate", "NSArray"] }
objc2-virtualization = { version = "0.3", features = ["VZVirtualMachine", "VZVirtualMachineConfiguration", "VZBootLoader", "VZLinuxBootLoader", "VZSerialPortConfiguration", "VZVirtioConsoleDeviceSerialPortConfiguration", "VZSerialPortAttachment", "VZFileHandleSerialPortAttachment", "VZEntropyDeviceConfiguration", "VZVirtioEntropyDeviceConfiguration", "VZMemoryBalloonDeviceConfiguration", "VZVirtioTraditionalMemoryBalloonDeviceConfiguration", "VZDirectorySharingDeviceConfiguration", "VZVirtioFileSystemDeviceConfiguration", "VZDirectoryShare", "VZSingleDirectoryShare", "VZSharedDirectory", "VZStorageDeviceConfiguration", "VZVirtioBlockDeviceConfiguration", "VZStorageDeviceAttachment", "VZDiskImageStorageDeviceAttachment", "VZNetworkDeviceConfiguration", "VZVirtioNetworkDeviceConfiguration", "VZNetworkDeviceAttachment", "VZNATNetworkDeviceAttachment", "VZSocketDeviceConfiguration", "VZVirtioSocketDeviceConfiguration", "VZSocketDevice", "VZVirtioSocketDevice", "VZVirtioSocketListener", "VZVirtioSocketConnection", "block2", "dispatch2"] }
block2               = "0.6"
dispatch2            = "0.3"
base64               = "0.22"
thiserror            = "1"
nix                  = { version = "0.29", features = ["term", "signal"] }
libc                 = "0.2"
rand                 = "0.8"
serde                = { version = "1", features = ["derive"] }
serde_json           = "1"

# Internal crates. `path` builds the workspace locally; `version` lets each
# crate be published to crates.io (publish strips `path` and uses `version`).
vmette                   = { path = "crates/vmette", version = "0.1.1" }
vmette-proto             = { path = "crates/vmette-proto", version = "0.1.1" }
vmette-assets            = { path = "crates/vmette-assets", version = "0.1.1" }
vmette-providers         = { path = "crates/vmette-providers", version = "0.1.1" }
vmette-provider-oci      = { path = "crates/vmette-provider-oci", version = "0.1.1" }
vmette-provider-squashfs = { path = "crates/vmette-provider-squashfs", version = "0.1.1" }
vmette-provider-tar      = { path = "crates/vmette-provider-tar", version = "0.1.1" }

[profile.release]
lto = "thin"
strip = true
