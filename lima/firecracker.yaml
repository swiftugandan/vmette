# Lima VM for the firecracker-spike.
#
# Goal: a Linux x86_64 guest with /dev/kvm exposed so we can run Firecracker.
#
# On an Intel iMac (Skylake) running macOS 14, nested virtualization through
# Hypervisor.framework/QEMU+HVF is generally NOT exposed to the guest. The VM
# itself will boot fine, but `/dev/kvm` inside it will likely be absent. The
# provision script logs the verdict to /var/log/kvm-probe.log so you can
# confirm.

images:
  - location: "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-amd64.img"
    arch: "x86_64"

cpus: 2
memory: "4GiB"
disk: "20GiB"

# QEMU + HVF is the default on Intel Mac. `vz` (Apple Virtualization.framework)
# is an alternative but its nested-virt story on Intel is no better.
vmType: "qemu"

# Mount the host project dir writable so cargo can write target/ from the guest.
# Adjust the location if you move the project.
mounts:
  - location: "/Users/p.munaawa/Documents/projects/chamuka/scratch"
    writable: true

ssh:
  loadDotSSHPubKeys: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y curl ca-certificates build-essential pkg-config e2fsprogs jq

      # Probe KVM — the answer determines whether firecracker can run here.
      {
        echo "=== KVM probe ==="
        date -u
        echo "-- /dev/kvm before modprobe --"
        ls -l /dev/kvm 2>&1 || true
        echo "-- attempting modprobe kvm_intel --"
        modprobe kvm_intel 2>&1 || true
        echo "-- /dev/kvm after modprobe --"
        ls -l /dev/kvm 2>&1 || true
        echo "-- lsmod | grep kvm --"
        lsmod | grep -i kvm || true
        echo "-- cpuinfo vmx flag --"
        grep -m1 -E 'vmx|svm' /proc/cpuinfo || echo "(no vmx/svm — nested virt not exposed)"
      } | tee /var/log/kvm-probe.log

      # Install Firecracker (latest stable as of writing).
      VER=v1.7.0
      ARCH=$(uname -m)
      cd /tmp
      curl -fsSL -o fc.tgz "https://github.com/firecracker-microvm/firecracker/releases/download/${VER}/firecracker-${VER}-${ARCH}.tgz"
      tar xzf fc.tgz
      install -m 0755 "release-${VER}-${ARCH}/firecracker-${VER}-${ARCH}" /usr/local/bin/firecracker
      install -m 0755 "release-${VER}-${ARCH}/jailer-${VER}-${ARCH}"      /usr/local/bin/jailer
      firecracker --version

      # Let the default user talk to /dev/kvm if it appears.
      groupadd -f kvm
      DEFUSER="$(getent passwd 1000 | cut -d: -f1)"
      [[ -n "$DEFUSER" ]] && usermod -aG kvm "$DEFUSER" || true

  - mode: user
    script: |
      #!/bin/bash
      set -eux
      if ! command -v cargo >/dev/null 2>&1; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
          sh -s -- -y --default-toolchain stable --profile minimal
      fi
      # shellcheck disable=SC1091
      source "$HOME/.cargo/env" || true
      cargo --version
