name: desktop-image

# Builds and pushes the desktop computer-use rootfs image to GHCR. vmette's
# Agent workload pulls this as the registry fallback when no local
# assets/vmette-desktop-rootfs.tar is discovered (see vmette_assets and
# docs/DESKTOP.md). Built natively on amd64 — the guest is x86_64-only.
on:
  push:
    tags: ['v*']                          # release  -> :latest + :<version>
    branches: [main]
    paths:                                # source change on main -> :latest
      - 'images/vmette-desktop/**'
      - 'guest/vmette-desktop-agent.c'
      - '.github/workflows/desktop-image.yml'
  workflow_dispatch:

# GITHUB_TOKEN needs package-write to push to ghcr.io; the package must be
# linked to this repo (Package settings -> Manage Actions access) for the
# token to be accepted.
permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/chamuka-inc/vmette-desktop

jobs:
  build-push:
    name: build + push desktop rootfs (linux/amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # The Dockerfile expects the agent source inside its build context
      # (COPY vmette-desktop-agent.c). The local build-desktop-image.sh stages
      # it the same way; mirror that here so the two paths stay identical.
      - name: Stage agent source into build context
        run: cp guest/vmette-desktop-agent.c images/vmette-desktop/

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # Always tag :latest. On a v* release tag, also push the immutable
      # version tag (e.g. :0.1.0) so the published image is reproducible.
      - name: Compute tags
        id: tags
        run: |
          tags="${IMAGE}:latest"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tags="${tags},${IMAGE}:${GITHUB_REF#refs/tags/v}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "Pushing: ${tags}"

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: images/vmette-desktop
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Single-arch rootfs consumed by vmette's OCI provider: keep a plain
          # manifest, not a provenance attestation index (some minimal OCI
          # clients mishandle the extra attestation entry).
          provenance: false
